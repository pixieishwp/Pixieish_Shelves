<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&family=Satisfy&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <div class="splash-title">Pixieish Shelves</div>
  <div class="splash-tagline">Your whimsical cozy-world for reading</div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" style="display:none;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="errorMsg" style="color:red;"></p>
</div>

<!-- 📱 APP -->
<div id="appScreen" style="display:none;">

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">
    <button id="writerBtn" onclick="setMode('writer')">Writer</button>
    <button onclick="setMode('reader')">Reader</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- ✍️ WRITER SECTION -->
  <div id="writerSection">
    <h3>Writer Mode</h3>

    <input id="title" placeholder="Title">
    <input id="genre" placeholder="Genre">
    <input id="coverURL" placeholder="Cover URL">
    <textarea id="synopsis" placeholder="Synopsis"></textarea>

    <button onclick="addBook()">Create Book</button>
  </div>

  <!-- 📚 BOOKS -->
  <h3>Your Books</h3>
  <div id="yourBooks"></div>

</div>

<!-- 📖 BOOK PAGE -->
<div id="bookPage" style="display:none;">
  <button onclick="closeBook()">Back</button>

  <h2 id="bookTitle"></h2>

  <div id="writerBookControls">
    <input id="chapterTitle" placeholder="Chapter title">
    <textarea id="chapterContent" placeholder="Write here..."></textarea>

    <button onclick="addChapter()">Save Chapter</button>
  </div>

  <div id="chapterList"></div>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
