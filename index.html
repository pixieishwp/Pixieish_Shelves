<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  Pixieish Shelves
  <p class="tagline">your cozy world of reading</p>
</div>

<div class="container">

  <!-- WRITER MODE -->
  <div class="card">
    <h3>Writer Mode</h3>

    <input id="bookTitle" placeholder="Enter book title..." />
    <textarea id="bookContent" placeholder="Start writing your story..."></textarea>

    <button onclick="addBook()">Publish Book</button>
  </div>

  <!-- LIBRARY -->
  <div id="library"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
