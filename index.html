<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <div class="splash-title">Pixieish Shelves ✨</div>
  <div class="splash-tagline">Where stories feel like magic</div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="auth" style="display:none;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 📱 APP -->
<div id="appScreen" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    Pixieish Shelves ✨
    <div class="tagline">Where stories feel like magic</div>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- ✍️ WRITER MODE -->
    <div class="card" id="writerCard">

      <h3>✍️ Writer Mode</h3>

      <input id="title" placeholder="Book Title">
      <input id="genre" placeholder="Genre">
      <input id="coverURL" placeholder="Cover Image URL (optional)">
      <textarea id="synopsis" placeholder="Short synopsis..."></textarea>

      <button onclick="addBook()">Create Book</button>

      <p id="status"></p>

    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>

</div>

<!-- 🔥 FIREBASE + SCRIPT -->
<script type="module" src="app.js"></script>

</body>
</html>
