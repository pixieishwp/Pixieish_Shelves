<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <div class="splash-title">Pixieish Shelves ✨</div>
  <div class="splash-tagline">Where stories feel like magic</div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="auth" style="display:none;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 📱 APP -->
<div id="appScreen" style="display:none;">

  <div class="header">
    Pixieish Shelves ✨
    <div class="tagline">Where stories feel like magic</div>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- ✍️ WRITER MODE -->
    <div id="writerSection" style="display:none;">
      <div class="card">
        <h3>✍️ Writer Mode</h3>

        <input id="title" placeholder="Book Title">
        <input id="genre" placeholder="Genre">
        <input id="coverURL" placeholder="Cover URL">
        <textarea id="synopsis" placeholder="Synopsis"></textarea>

        <button onclick="addBook()">Create Book</button>
        <p id="status"></p>
      </div>
    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>
</div>

<!-- 📖 BOOK PAGE -->
<div id="bookPage" style="display:none;" class="container">

  <button onclick="closeBook()">← Back</button>
  <h2 id="bookTitle"></h2>

  <!-- ✍️ WRITER CONTROLS -->
  <div id="writerBookControls" style="display:none;">

    <div class="card">
      <h3>Add Chapter</h3>

      <input id="chapterTitle" placeholder="Chapter Title">
      <textarea id="chapterContent"></textarea>

      <button onclick="addChapter()">Publish Chapter</button>
    </div>

    <button onclick="deleteBook()" style="background:#e57373;">
      Delete Book
    </button>

  </div>

  <!-- 📑 CHAPTER LIST -->
  <div class="card">
    <h3>Chapters</h3>
    <div id="chapterList"></div>
  </div>

</div>

<!-- 📖 READER -->
<div id="readerMode" style="display:none;" class="container">
  <button onclick="closeReader()">← Back</button>
  <h2 id="readerTitle"></h2>
  <div id="readerContent"></div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
