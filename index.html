<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <div class="splash-title">Pixieish Shelves ✨</div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" style="display:none;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <!-- ✅ ERROR MESSAGE HERE -->
  <p id="errorMsg" style="color:red;"></p>
</div>
  
  <!-- ✍️ WRITER -->
  <div id="writerSection" style="display:none;">
    <h3>Writer Mode</h3>

    <input id="title" placeholder="Title">
    <input id="genre" placeholder="Genre">
    <input id="coverURL" placeholder="Cover URL">
    <textarea id="synopsis"></textarea>

    <button onclick="addBook()">Create Book</button>
  </div>

  <!-- 📚 LIBRARY -->
  <h3>Your Books</h3>
  <div id="yourBooks"></div>

</div>

<!-- 📖 BOOK -->
<div id="bookPage" style="display:none;">
  <button onclick="closeBook()">Back</button>

  <h2 id="bookTitle"></h2>

  <!-- ✍️ WRITER CONTROLS -->
  <div id="writerBookControls" style="display:none;">
    <input id="chapterTitle" placeholder="Chapter title">
    <textarea id="chapterContent"></textarea>
    <button onclick="addChapter()">Add Chapter</button>

    <button onclick="deleteBook()">Delete Book</button>
  </div>

  <div id="chapterList"></div>
</div>

<!-- 📖 READER -->
<div id="readerMode" style="display:none;">
  <button onclick="closeReader()">Back</button>

  <h2 id="readerTitle"></h2>
  <div id="readerContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
