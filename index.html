<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">Pixieish Shelves</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="auth" style="display:none;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="authStatus"></p>
</div>

<!-- 📱 APP -->
<div id="appScreen" style="display:none;">

  <div class="header">
    PIXIEISH SHELVES
    <p class="tagline">your whimsical cozy-world for reading</p>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- ✍️ WRITER -->
    <div id="writerMode" class="card">
      <h3>Create Story</h3>

      <input id="title" placeholder="Title">
      <textarea id="synopsis" placeholder="Synopsis"></textarea>

      <input id="genre" placeholder="Genre">
      <input id="coverURL" placeholder="Cover URL">

      <textarea id="content" placeholder="Start writing..."></textarea>

      <button onclick="addBook()">Save Book</button>
      <p id="status"></p>
    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
