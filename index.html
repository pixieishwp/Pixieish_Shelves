<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🌸 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <h1 class="splash-title">Pixieish Shelves</h1>
  <p class="splash-tagline">your whimsical cozy-world for reading</p>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="container">
  <div class="card">
    <h2 style="text-align:center;">Pixieish Shelves</h2>
    <p class="tagline" style="text-align:center;">your whimsical cozy-world for reading</p>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>

    <p id="authStatus"></p>
  </div>
</div>

<!-- 📚 APP -->
<div id="appScreen" style="display:none;">

  <div class="header">
    Pixieish Shelves
    <p class="tagline">your whimsical cozy-world for reading</p>
  </div>

  <div class="container">

    <button onclick="logout()">Logout</button>

    <!-- ✍️ WRITER -->
    <div class="card" id="writerMode">
      <h3>Writer Mode</h3>

      <input id="title" placeholder="Book title..." />
      <textarea id="synopsis" placeholder="Synopsis..."></textarea>
      <input id="genre" placeholder="Genre" />
      <input id="series" placeholder="Series" />

      <select id="statusSelect">
        <option value="ongoing">Ongoing</option>
        <option value="completed">Completed</option>
      </select>

      <textarea id="content" placeholder="Chapter 1..."></textarea>

      <button onclick="addBook()">Publish Book</button>
      <p id="status"></p>
    </div>

    <!-- 📖 CHAPTER -->
    <div class="card" id="chapterMode" style="display:none;">
      <h3>Chapters</h3>

      <select id="bookSelect"></select>
      <input id="chapterTitle" placeholder="Chapter title..." />
      <textarea id="chapterContent"></textarea>

      <button onclick="addChapter()">Add Chapter</button>
      <p id="chapterStatus"></p>
    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Stories</h3>
      <div id="yourBooks"></div>
    </div>

  </div>
</div>

<!-- 📖 READER VIEW -->
<div id="readerView" style="display:none; padding:20px;">

  <button onclick="closeReader()">← Back</button>

  <div class="card">
    <h2 id="readTitle"></h2>
    <p id="readMeta"></p>
    <p id="readSynopsis"></p>
  </div>

  <div class="card">
    <h3>Chapters</h3>
    <div id="chapterList"></div>
  </div>

  <div class="card" id="chapterReader" style="display:none;">
    <h3 id="chapterReadTitle"></h3>
    <p id="chapterReadContent"></p>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
