<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&family=Holtwood+One+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH (FIXED) -->
<div id="splash">
  <div class="splash-content">
    <h1 class="splash-title">Pixieish Shelves</h1>
    <p class="splash-tagline">your cozy reading world ✨</p>
  </div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="authStatus"></p>
</div>

<!-- 📱 APP -->
<div id="appScreen" style="display:none;">

  <div class="header">
    PIXIEISH SHELVES
    <p class="tagline">your whimsical cozy-world for reading</p>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- ✍️ WRITER -->
    <div id="writerMode" class="card" style="display:none;">
      <h3>Create Story</h3>

      <input id="title" placeholder="Title">
      <textarea id="synopsis" placeholder="Synopsis"></textarea>

      <input id="genre" placeholder="Genre">
      <input id="series" placeholder="Series">

      <select id="statusSelect">
        <option value="ongoing">Ongoing</option>
        <option value="completed">Completed</option>
      </select>

      <input id="coverURL" placeholder="Paste cover image URL">

      <textarea id="content" placeholder="Start writing..."></textarea>

      <label>
        <input type="checkbox" id="publishBook"> Publish Book
      </label>

      <button onclick="addBook()">Save Book</button>
      <p id="status"></p>
    </div>

    <!-- 📖 CHAPTER -->
    <div id="chapterMode" class="card" style="display:none;">
      <h3>Add Chapter</h3>

      <select id="bookSelect"></select>
      <input id="chapterTitle" placeholder="Chapter Title">
      <textarea id="chapterContent"></textarea>

      <label>
        <input type="checkbox" id="publishChapter"> Publish Chapter
      </label>

      <button onclick="addChapter()">Add Chapter</button>
      <p id="chapterStatus"></p>
    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
