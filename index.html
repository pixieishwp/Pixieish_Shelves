<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🌸 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH SCREEN -->
<div id="splash">
  <h1 class="splash-title">Pixieish Shelves</h1>
  <p class="splash-tagline">your whimsical cozy-world for reading</p>
</div>

<!-- 🔐 AUTH SCREEN -->
<div id="authScreen" class="container">
  <div class="card">
    <h2 style="text-align:center;">Pixieish Shelves</h2>
    <p class="tagline" style="text-align:center;">your whimsical cozy-world for reading</p>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>

    <p id="authStatus"></p>
  </div>
</div>

<!-- 📚 MAIN APP -->
<div id="appScreen" style="display:none;">

  <div class="header">
    Pixieish Shelves
    <p class="tagline">your whimsical cozy-world for reading</p>
  </div>

  <div class="container">

    <button onclick="logout()">Logout</button>

    <!-- ✍️ WRITER MODE (ADMIN ONLY) -->
    <div class="card" id="writerMode">
      <h3>Writer Mode</h3>

      <input id="title" placeholder="Book title..." />

      <textarea id="synopsis" placeholder="Write a short synopsis..."></textarea>

      <input id="genre" placeholder="Genre (e.g. Romance, Fantasy)" />

      <input id="series" placeholder="Series (leave blank if standalone)" />

      <select id="statusSelect">
        <option value="ongoing">Ongoing</option>
        <option value="completed">Completed</option>
      </select>

      <textarea id="content" placeholder="Start writing Chapter 1..."></textarea>

      <button onclick="addBook()">Publish Book</button>

      <p id="status"></p>
    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Stories</h3>
      <div id="yourBooks"></div>
    </div>

  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
