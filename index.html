<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash" class="screen">
  <h1>Pixieish Shelves</h1>
  <p>Your whimsical cozy-world for reading</p>
</div>

<!-- 🔐 LOGIN -->
<div id="login" class="screen hidden">
  <div class="card">
    <h2>Welcome</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signUp()">Sign Up</button>
  </div>
</div>

<!-- 🏠 HOME -->
<div id="home" class="screen hidden">

  <div class="header">
    Pixieish Shelves
    <p class="tagline">your cozy world of reading</p>
  </div>

  <div class="container">

    <div class="card">
      <h3>Continue Reading</h3>

      <div class="book-card">
        <div class="book-cover"></div>

        <div class="book-info">
          <strong>What Was Never Enough</strong>
          <div class="progress">
            <div class="progress-bar"></div>
          </div>
        </div>
      </div>

      <button onclick="openReader()">Continue Reading</button>
    </div>

    <div class="card">
      <h3>My Library</h3>
      <p>Your cozy collection of stories</p>
      <button>Add Book</button>
    </div>

  </div>
</div>

<!-- 📖 READER -->
<div id="reader" class="screen hidden">

  <div class="header">
    <button onclick="goBack()">← Back</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>Simula</h2>
      <p id="text">
        What was never enough? Maybe it was the silence, or the things left unsaid.
      </p>

      <button onclick="highlight()">Highlight</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ✅ YOUR FIREBASE CONFIG (ALREADY FIXED)
const firebaseConfig = {
  apiKey: "AIzaSyDe8yZUNqXyP9O4yx1J8JYetJT6c7i8qdI",
  authDomain: "pixieish-shelves.firebaseapp.com",
  projectId: "pixieish-shelves",
  storageBucket: "pixieish-shelves.firebasestorage.app",
  messagingSenderId: "458160398514",
  appId: "1:458160398514:web:b8bd9d073d5823575b29ab",
  measurementId: "G-5K5L5N9X8B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGN UP
window.signUp = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Account created 💖");
      showScreen("home");
    })
    .catch(err => alert(err.message));
};

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Welcome back 💖");
      showScreen("home");
    })
    .catch(err => alert(err.message));
};

// APP FLOW
setTimeout(() => {
  showScreen("login");
}, 2000);

function openReader() {
  showScreen("reader");
}

function goBack() {
  showScreen("home");
}

function highlight() {
  document.getElementById("text").classList.toggle("highlight");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
