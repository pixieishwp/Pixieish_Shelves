<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
  <h1>Pixieish Shelves</h1>
  <p>Your whimsical cozy-world for reading</p>
</div>

<!-- LOGIN -->
<div id="login" class="screen hidden">
  <div class="card">
    <h2>Welcome</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signUp()">Sign Up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen hidden">

  <div class="header">
    Pixieish Shelves
    <p class="tagline">your cozy world of reading</p>
  </div>

  <div class="container" id="mainContainer">

    <!-- WRITER PANEL -->
    <div id="writerPanel" class="card hidden">
      <h3>👑 Writer Mode</h3>
      <button onclick="publishBook()">Publish Book</button>
    </div>

    <!-- ADD BOOK -->
    <div class="card">
      <h3>Add to Library</h3>
      <p>Save this story to your shelves</p>
      <button onclick="addBook()">Add Book</button>
    </div>

    <!-- LIBRARY -->
    <div id="librarySection"></div>

  </div>
</div>

<!-- READER -->
<div id="reader" class="screen hidden">
  <div class="header">
    <button onclick="goBack()">← Back</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>Simula</h2>
      <p id="text">
        What was never enough? Maybe it was the silence...
      </p>
      <button onclick="highlight()">Highlight</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDe8yZUNqXyP9O4yx1J8JYetJT6c7i8qdI",
  authDomain: "pixieish-shelves.firebaseapp.com",
  projectId: "pixieish-shelves",
  storageBucket: "pixieish-shelves.firebasestorage.app",
  messagingSenderId: "458160398514",
  appId: "1:458160398514:web:b8bd9d073d5823575b29ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGN UP
window.signUp = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
      showScreen("home");
      checkWriter(email);
      loadBooks();
    });
};

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      showScreen("home");
      checkWriter(email);
      loadBooks();
    });
};

// WRITER CHECK
function checkWriter(email) {
  if (email === "pixieishwp@gmail.com") {
    document.getElementById("writerPanel").classList.remove("hidden");
  }
}

// ADD BOOK (READER)
window.addBook = async function() {
  const user = auth.currentUser;

  await addDoc(collection(db, "books"), {
    title: "What Was Never Enough",
    userId: user.uid
  });

  alert("Added to library 💖");
  loadBooks();
};

// PUBLISH BOOK (WRITER)
window.publishBook = async function() {
  const user = auth.currentUser;

  await addDoc(collection(db, "books"), {
    title: "New Story by Admin ✨",
    userId: user.uid
  });

  alert("Story published ✨");
  loadBooks();
};

// LOAD BOOKS (FIXED ❗)
window.loadBooks = async function() {
  const user = auth.currentUser;
  if (!user) return;

  const querySnapshot = await getDocs(collection(db, "books"));
  const library = document.getElementById("librarySection");

  let html = `
    <div class="card">
      <h3>My Library</h3>
  `;

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    if (data.userId === user.uid) {
      html += `
        <div class="book-card">
          <div class="book-cover"></div>
          <div class="book-info">
            <strong>${data.title}</strong>
          </div>
        </div>
      `;
    }
  });

  html += `</div>`;

  // ✅ THIS IS THE FIX (NO MORE DUPLICATES)
  library.innerHTML = html;
};

// UI FLOW
setTimeout(() => showScreen("login"), 2000);

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function goBack() {
  showScreen("home");
}

function highlight() {
  document.getElementById("text").classList.toggle("highlight");
}
</script>

</body>
</html>
