<div id="appScreen" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    Pixieish Shelves ✨
    <div class="tagline">Where stories feel like magic</div>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container" id="mainContainer">

    <!-- ✍️ WRITER MODE (AUTO LOCKED BY JS) -->
    <div class="card" id="writerCard">

      <h3>✍️ Writer Mode</h3>

      <input id="title" placeholder="Book Title">

      <input id="genre" placeholder="Genre (e.g. Romance, Fantasy)">

      <input id="coverURL" placeholder="Cover Image URL (optional)">

      <textarea id="synopsis" placeholder="Short synopsis..."></textarea>

      <textarea id="content" placeholder="Start writing your story..."></textarea>

      <button onclick="addBook()">Save Book</button>

      <p id="status" style="font-size:12px; margin-top:5px;"></p>

    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>

</div>
