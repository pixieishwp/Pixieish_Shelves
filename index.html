<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH SCREEN -->
<div id="splash" class="screen active">
  <h1>Pixieish Shelves</h1>
  <p>Your whimsical cozy-world for reading</p>
</div>

<!-- 🔐 LOGIN SCREEN -->
<div id="login" class="screen hidden">
  <div class="card">
    <h2>Welcome Back</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="enterApp()">Enter</button>
  </div>
</div>

<!-- 🏠 HOME -->
<div id="home" class="screen hidden">

  <div class="header">
    Pixieish Shelves
    <p class="tagline">your cozy world of reading</p>
  </div>

  <div class="container">

    <div class="card">
      <h3>Continue Reading</h3>

      <div class="book-card">
        <div class="book-cover"></div>
        <div class="book-info">
          <strong>What Was Never Enough</strong>
          <div class="progress">
            <div class="progress-bar"></div>
          </div>
        </div>
      </div>

      <button onclick="openReader()">Continue Reading</button>
    </div>

    <div class="card">
      <h3>My Library</h3>
      <p>Your cozy collection of stories</p>
      <button>Add Book</button>
    </div>

  </div>
</div>

<!-- 📖 READER -->
<div id="reader" class="screen hidden">

  <div class="header">
    <button onclick="goBack()">← Back</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>Simula</h2>
      <p id="text">
        What was never enough? Maybe it was the silence, or the things left unsaid.
      </p>

      <button onclick="highlight()">Highlight</button>
    </div>
  </div>

</div>

<script>
// 🌸 Splash → Login
setTimeout(() => {
  showScreen("login");
}, 2000);

// 🔐 Enter app
function enterApp() {
  showScreen("home");
}

// 📖 Open reader
function openReader() {
  showScreen("reader");
}

// 🔙 Back
function goBack() {
  showScreen("home");
}

// ✨ Highlight
function highlight() {
  document.getElementById("text").classList.toggle("highlight");
}

// 🔄 Screen switcher
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
