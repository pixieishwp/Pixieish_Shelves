<!DOCTYPE html>
<html>
<head>
  <title>Pixieish Shelves</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <h1 class="splash-title">Pixieish Shelves</h1>
  <p class="splash-tagline">your cozy reading world ✨</p>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen" class="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 📱 APP -->
<div id="appScreen">

  <div class="header">
    PIXIEISH SHELVES
    <p class="tagline">your whimsical cozy-world for reading</p>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <div id="writerMode" class="card">
      <h3>Create Story</h3>
      <input id="title" placeholder="Title">
      <textarea id="synopsis" placeholder="Synopsis"></textarea>
      <input id="genre" placeholder="Genre">
      <input id="coverURL" placeholder="Cover URL">
      <button onclick="addBook()">Save Book</button>
    </div>

    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>
</div>

<!-- 📖 READER -->
<div id="readerView" class="reader">
  <button onclick="closeReader()">← Back</button>

  <img id="readCover">
  <h2 id="readTitle"></h2>
  <p id="readMeta"></p>
  <p id="readSynopsis"></p>

  <div id="chapterList"></div>

  <div id="readerAddChapter">
    <input id="chapterTitle" placeholder="Chapter title">
    <textarea id="chapterContent"></textarea>
    <button onclick="addChapterFromReader()">Add Chapter</button>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
