<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixieish Shelves ✨</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Crimson+Text&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <div class="splash-title">Pixieish Shelves ✨</div>
  <div class="splash-tagline">Where stories feel like magic</div>
</div>

<!-- 🔐 AUTH SCREEN -->
<div id="authScreen" class="auth">

  <h2>Welcome ✨</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="authStatus"></p>

</div>

<!-- 📱 APP SCREEN -->
<div id="appScreen" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    Pixieish Shelves ✨
    <div class="tagline">Where stories feel like magic</div>

    <div class="menu">
      <button onclick="toggleMenu()">☰</button>
      <div id="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container" id="mainContainer">

    <!-- ✍️ WRITER MODE -->
    <div class="card" id="writerCard">

      <h3>✍️ Writer Mode</h3>

      <input id="title" placeholder="Book Title">
      <input id="genre" placeholder="Genre (Romance, Fantasy...)">
      <input id="coverURL" placeholder="Cover Image URL (optional)">

      <textarea id="synopsis" placeholder="Short synopsis..."></textarea>

      <button onclick="addBook()">Create Book</button>

      <p id="status" style="font-size:12px;"></p>

      <hr>

      <!-- 📖 CHAPTER SYSTEM -->
      <h4>Add Chapter</h4>

      <input id="chapterTitle" placeholder="Chapter Title">
      <textarea id="chapterContent" placeholder="Write chapter..."></textarea>

      <button onclick="addChapter()">Add Chapter</button>

    </div>

    <!-- 📚 LIBRARY -->
    <div class="card">
      <h3>Your Library</h3>
      <div id="yourBooks"></div>
    </div>

  </div>
</div>

<!-- 📖 READER MODE -->
<div id="readerMode" style="display:none;">

  <button onclick="closeReader()">← Back</button>

  <h2 id="readerTitle"></h2>

  <div id="readerContent"></div>

</div>

<!-- 🔥 APP JS -->
<script type="module" src="app.js"></script>

</body>
  </html>
